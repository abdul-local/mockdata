name: Go

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'
    
    - name: Vulnerability check
      uses: golang/govulncheck-action@v1
      with:
        go-version-input: 1.22.1
        go-package: ./...
    - name: Deploy Success
      run: echo "🚀 Deployment triggered because build passed!"