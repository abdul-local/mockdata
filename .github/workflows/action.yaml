name: Go

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: latest

    - name: Lint
      uses: golangci/golangci-lint-action@v6
      with:
        version: latest
    
    - name: Vulnerability check
      uses: golang/govulncheck-action@v1
      with:
          go-version-input: 1.25.0
          go-package: ./...
